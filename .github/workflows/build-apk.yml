name: Build Android APK

on:
  push:
    branches:
      - master
    paths:
      - 'src/renderer/**'
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp src/renderer/index.html android/app/src/main/assets/www/index.html
          cp src/renderer/styles.css android/app/src/main/assets/www/styles.css
          cp src/renderer/app.js android/app/src/main/assets/www/app.js
          if [ -f src/renderer/icon.png ]; then
            cp src/renderer/icon.png android/app/src/main/assets/www/icon.png
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Copy APK to renderer
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk src/renderer/MyDays.apk

      - name: Commit and Push APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build APK from GitHub Actions [skip ci]"
          file_pattern: "src/renderer/MyDays.apk"
